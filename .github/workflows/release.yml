name: Release — Build, Publish & Deploy

on:
  push:
    tags:
      - 'v*.*.*'   # triggers on v1.0.0, v1.2.3, etc.

jobs:
  # ── Windows installer ───────────────────────────────────────────────────────
  release-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build shared packages
        run: |
          pnpm --filter @announcement/shared build
          pnpm --filter @announcement/audio-engine build

      - name: Rebuild native modules for Windows
        working-directory: apps/desktop
        run: npx electron-rebuild -f -w better-sqlite3

      - name: Build & package Windows installer
        run: pnpm --filter @announcement/desktop build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LICENSE_SERVER_URL: ${{ secrets.LICENSE_SERVER_URL }}

      - name: Upload Windows installer to release
        uses: softprops/action-gh-release@v2
        with:
          files: apps/desktop/dist/*.exe
          draft: false
          prerelease: ${{ contains(github.ref, '-beta') || contains(github.ref, '-rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Linux installer ─────────────────────────────────────────────────────────
  release-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build shared packages
        run: |
          pnpm --filter @announcement/shared build
          pnpm --filter @announcement/audio-engine build

      - name: Install Linux packaging deps
        run: sudo apt-get install -y rpm

      - name: Rebuild native modules for Linux
        working-directory: apps/desktop
        run: npx electron-rebuild -f -w better-sqlite3

      - name: Build & package Linux installers
        run: pnpm --filter @announcement/desktop build:linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LICENSE_SERVER_URL: ${{ secrets.LICENSE_SERVER_URL }}

      - name: Upload Linux installers to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            apps/desktop/dist/*.AppImage
            apps/desktop/dist/*.deb
          draft: false
          prerelease: ${{ contains(github.ref, '-beta') || contains(github.ref, '-rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Deploy license server to Railway ───────────────────────────────────────
  deploy-railway:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        run: railway up --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  # ── Deploy web portal to Vercel ─────────────────────────────────────────────
  deploy-vercel:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @announcement/shared build

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy web portal to Vercel (production)
        working-directory: apps/web-portal
        run: |
          vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
          vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
          vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          NEXT_PUBLIC_LICENSE_SERVER_URL: ${{ secrets.LICENSE_SERVER_URL }}
